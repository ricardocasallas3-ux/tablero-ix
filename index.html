.ks{font-size:10px;color:#aaa;margin-top:3px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}

.ch{position:relative;height:260px}

.dia-btn.on{background:#1F4E79;color:#fff;border-color:#1F4E79}
.dia-btn.empty{background:#f2f2f2;color:#bbb;border-color:#e5e5e5;cursor:default}
.dia-btn:not(.empty):hover{background:#D6E4F0;border-color:#2E75B6}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1F4E79;color:#fff;padding:8px 10px;text-align:left;font-weight:600;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid #eee;vertical-align:middle}
tr.click{cursor:pointer}
tr.click:hover td{background:#EBF3FB}
.badge{display:inline-block;background:#D6E4F0;color:#1F4E79;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:bold;white-space:nowrap}
.bar-wrap{display:flex;align-items:center;gap:6px}
.barh{height:8px;border-radius:4px;min-width:2px}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:1000;align-items:center;justify-content:center}
.mbg.show{display:flex}
.modal{background:#fff;border-radius:10px;padding:24px;width:92%;max-width:820px;max-height:88vh;overflow-y:auto;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.28)}
.mclose{position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#888}
.mtitle{font-size:15px;font-weight:bold;color:#1F4E79;margin-bottom:3px}
.mdesc{font-size:11px;color:#888;margin-bottom:14px}
.mmeta{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap}

.ch-m{position:relative;height:290px}
.info-m1{background:#fff;border-radius:8px;padding:20px;text-align:center;color:#888;font-size:13px;border:2px dashed #dde3ea}

      <div class="card"><h3>Top 10 causas BTI</h3><div class="ch"><canvas id="c2"></canvas></div></div>
    </div>`:
    `<div class="kpis">

      <div class="kpi"><div class="kl">Total ORs clasificadas</div><div class="kv">${fmt(totalP2)}</div><div class="ks">Fuente: ingresadas</div></div>
    </div>

        <th>#</th><th>Causa BTI</th><th>Descripcion</th>
        <th style="text-align:right">ORs mes</th>
        <th style="min-width:140px">% mes</th><th>Detalle</th>
      </tr></thead><tbody id="tbody"></tbody></table>
    </div>`;

  const dias=p1.dias||[];
  if(p1.dias&&p1.dias.length>0){
    const C1=document.getElementById('c1').getContext('2d');
    charts.push(new Chart(C1,{type:'line',
      data:{labels:dias.map(d=>'D'+d),datasets:[
        {label:'Ingresadas',data:dias.map(d=>(p1.series.ingresadas&&p1.series.ingresadas[d])||null),borderColor:'#2E75B6',backgroundColor:'rgba(46,117,182,.08)',tension:.3,pointRadius:2},

function abrirDetalleMes(c,dias){
  if(modalChart){modalChart.destroy();modalChart=null;}
  document.getElementById('m-tit').textContent  = c.bti+' — Detalle diario ('+mes+')';
  document.getElementById('m-desc').textContent = c.desc||'';
  document.getElementById('m-meta').innerHTML=`
    <div class="m"><strong>${fmt(c.total)}</strong>ORs totales</div>
    <div class="m"><strong>${c.pct!=null?c.pct.toFixed(2)+'%':'—'}</strong>% del mes</div>`;
  const todos=dias.length>0?dias:Object.keys(c.diario).map(Number).sort((a,b)=>a-b);
  const vals=todos.map(d=>c.diario[d]||0);
  const ctx=document.getElementById('m-ch').getContext('2d');
  modalChart=new Chart(ctx,{type:'bar',
    data:{labels:todos.map(d=>'Dia '+d),datasets:[{label:'ORs',data:vals,backgroundColor:vals.map(v=>v>0?'#2E75B6':'#EEE'),borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{title:c=>c[0].label,label:c=>` ${c.parsed.y} ORs`}}},
      scales:{y:{beginAtZero:true,ticks:{precision:0}},x:{ticks:{font:{size:10},maxRotation:0}}}
    }
  });
  document.getElementById('mbg').classList.add('show');
}

function renderDia(){
  const d=D[mes]; if(!d) return;
  const p1=d.pred1, p2=d.pred2;
  const dias=(p1.dias&&p1.dias.length)?p1.dias:[...new Set(p2.flatMap(c=>Object.keys(c.diario||{}).map(Number)))].sort((a,b)=>a-b);

  if(!diaActual||!dias.includes(diaActual)){
    const conDatos=dias.filter(dd=>p2.some(c=>c.diario[dd]));
    diaActual=conDatos.length>0?conDatos[conDatos.length-1]:dias[dias.length-1];
  }

  const causasHoy=p2.map(c=>{const v=c.diario[diaActual]||0;return{...c,hoy:v}}).filter(c=>c.hoy>0).sort((a,b)=>b.hoy-a.hoy);
  const totalHoy=causasHoy.reduce((s,c)=>s+c.hoy,0);
  const ingrH  =(p1.series&&p1.series.ingresadas&&p1.series.ingresadas[diaActual])||0;
  const finalH =(p1.series&&p1.series.finalizadas&&p1.series.finalizadas[diaActual])||0;
  const incidH =(p1.series&&p1.series.incidentadas&&p1.series.incidentadas[diaActual])||0;
  const arrastreH=(p1.series&&p1.series.arrastre&&p1.series.arrastre[diaActual])||0;
  const mciH   =(p1.series&&p1.series.mci_pct&&p1.series.mci_pct[diaActual])||0;

  const diasBtns=dias.map(dd=>{
    const hay=p2.some(c=>c.diario[dd]);
    return `<button class="dia-btn${dd===diaActual?' on':''}${!hay?' empty':''}" onclick="${hay?`selDia(${dd})`:'void(0)'}">${dd}</button>`;
  }).join('');

  document.getElementById('main').innerHTML=`
    <div class="dia-bar"><label>Dia:</label><div class="dia-btns">${diasBtns}</div></div>
    <div class="sec">Medidor 2 — Causas BTI del Dia ${diaActual} de ${mes} <span style="font-size:11px;font-weight:normal;color:#888">. ${causasHoy.length} causas . ${fmt(totalHoy)} ORs</span></div>
    ${ingrH>0?`<div class="kpis">
      <div class="kpi ${mciH>0.15?'warn':mciH<0.08&&mciH>0?'ok':''}"><div class="kl">MCI del dia</div><div class="kv ${mciH>0.15?'red':mciH<0.08&&mciH>0?'green':''}">${(mciH*100).toFixed(1)}%</div><div class="ks">Meta &lt; 10%</div></div>
      <div class="kpi"><div class="kl">ORs Arrastre</div><div class="kv">${fmt(arrastreH)}</div><div class="ks">Del dia anterior</div></div>
      <div class="kpi"><div class="kl">ORs Ingresadas</div><div class="kv">${fmt(ingrH)}</div><div class="ks">Nuevas del dia</div></div>
      <div class="kpi"><div class="kl">ORs Finalizadas</div><div class="kv">${fmt(finalH)}</div><div class="ks">Cerradas hoy</div></div>
      <div class="kpi ${incidH>50?'warn':''}"><div class="kl">ORs Incidentadas</div><div class="kv">${fmt(incidH)}</div><div class="ks">Reportadas hoy</div></div>
    </div>`:'<div style="height:8px"></div>'}
    ${causasHoy.length===0?'<div class="card" style="color:#888;padding:20px">Sin registros BTI para este dia.</div>':''}
    ${causasHoy.length>0?`
    <div class="grid2">
      <div class="card"><h3>Distribucion de causas — Dia ${diaActual}</h3><div class="ch"><canvas id="cd1"></canvas></div></div>
      <div class="card"><h3>Hoy vs mes completo — Top 8</h3><div class="ch"><canvas id="cd2"></canvas></div></div>
    </div>
    <div class="card" style="margin-bottom:24px;overflow-x:auto"><table>
      <thead><tr><th>#</th><th>Causa BTI</th><th>Descripcion</th>
        <th style="text-align:right">ORs hoy</th><th style="min-width:120px">% del dia</th>
        <th style="text-align:right">ORs mes</th><th>% mes</th>
      </tr></thead><tbody id="tbody-dia"></tbody>
    </table></div>`:''}`;

  if(causasHoy.length===0) return;
  const top12=causasHoy.slice(0,12);
  const CD1=document.getElementById('cd1').getContext('2d');
  charts.push(new Chart(CD1,{type:'bar',
    data:{labels:top12.map(c=>c.bti),datasets:[{label:'ORs hoy',data:top12.map(c=>c.hoy),backgroundColor:top12.map((_,i)=>i===0?'#C55A11':i<3?'#ED7D31':'#2E75B6'),borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.x} ORs (${((ctx.parsed.x/totalHoy)*100).toFixed(1)}% del dia)`}}},
      scales:{x:{beginAtZero:true,ticks:{precision:0}},y:{ticks:{font:{size:11}}}}
    }
  }));

  const top8=causasHoy.slice(0,8);
  const CD2=document.getElementById('cd2').getContext('2d');
  charts.push(new Chart(CD2,{type:'bar',
    data:{labels:top8.map(c=>c.bti),datasets:[
      {label:'ORs hoy',data:top8.map(c=>c.hoy),backgroundColor:'#2E75B6',borderRadius:3},
      {label:'ORs mes',data:top8.map(c=>c.total),backgroundColor:'#BDD7EE',borderRadius:3},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11}}}},scales:{x:{ticks:{font:{size:10}}},y:{beginAtZero:true,ticks:{precision:0}}}}
  }));

  const tbody=document.getElementById('tbody-dia');
  causasHoy.forEach((c,i)=>{
    const pd=totalHoy>0?((c.hoy/totalHoy)*100).toFixed(1):0;
    const w=Math.round(c.hoy/causasHoy[0].hoy*110);
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td style="color:#bbb;font-size:11px">${i+1}</td>
      <td><span class="badge">${c.bti}</span></td>
      <td style="max-width:280px;font-size:11px;line-height:1.4">${c.desc||'—'}</td>
      <td style="text-align:right;font-weight:bold;color:#1F4E79;font-size:14px">${c.hoy}</td>
      <td><div class="bar-wrap"><div class="barh" style="width:${w}px;background:${i<1?'#C55A11':i<3?'#ED7D31':'#2E75B6'}"></div><span style="font-size:11px">${pd}%</span></div></td>
      <td style="text-align:right;color:#888">${fmt(c.total)}</td>
      <td style="font-size:11px;color:#888">${c.pct!=null?c.pct.toFixed(1)+'%':''}</td>`;
    tbody.appendChild(tr);
  });
}

function renderJira(){
  const d=D[mes];
  if(!d||!d.jira||!d.jira.kpis){
    document.getElementById('main').innerHTML='<div class="card" style="color:#888;padding:20px">Sin datos Jira para '+mes+'.</div>';
    return;
  }
  const j=d.jira;
  const kp=j.kpis||{};
  const activos=j.activos||[];
  const pctCerr=kp.nuevos>0?Math.round((kp.cerrados||0)/kp.nuevos*100):0;

  document.getElementById('main').innerHTML=`
    <div class="sec">Jira — Tickets ${mes} <span style="font-size:11px;font-weight:normal;color:#888">. Fuente: issues SQLite</span></div>
    <div class="kpis">
      <div class="kpi"><div class="kl">Tickets Creados</div><div class="kv">${fmt(kp.nuevos||0)}</div><div class="ks">Incidentes + Solicitudes</div></div>
      <div class="kpi ok"><div class="kl">Cerrados / Resueltos</div><div class="kv green">${fmt(kp.cerrados||0)}</div><div class="ks">${pctCerr}% del mes</div></div>
      <div class="kpi ${(kp.activos||0)>10?'warn':'gris'}"><div class="kl">Activos (sin cerrar)</div><div class="kv ${(kp.activos||0)>10?'red':''}">${fmt(kp.activos||0)}</div><div class="ks">Aun abiertos</div></div>
      <div class="kpi warn"><div class="kl">ORs Afectadas</div><div class="kv">${fmt(kp.ordenes||0)}</div><div class="ks">En incidentes del mes</div></div>
      <div class="kpi ${(kp.pend_proveedor||0)>3?'warn':'gris'}"><div class="kl">Pend. Proveedor</div><div class="kv ${(kp.pend_proveedor||0)>3?'red':''}">${fmt(kp.pend_proveedor||0)}</div><div class="ks">Esperando respuesta</div></div>
      <div class="kpi gris"><div class="kl">En Nivel 1</div><div class="kv">${fmt(kp.en_nivel1||0)}</div><div class="ks">En atencion N1</div></div>
    </div>
    <div class="grid2">
      <div class="card"><h3>Tickets creados por dia</h3><div class="ch"><canvas id="jc1"></canvas></div></div>
      <div class="card"><h3>Por Estado</h3><div class="ch"><canvas id="jc2"></canvas></div></div>
      <div class="card"><h3>Por Pais</h3><div class="ch"><canvas id="jc3"></canvas></div></div>
      <div class="card"><h3>Por Marca / Comercial</h3><div class="ch"><canvas id="jc4"></canvas></div></div>
    </div>
    <div class="sec">Incidentes Activos — ${mes} <span style="font-size:11px;font-weight:normal;color:#888">. ${activos.length} tickets abiertos</span></div>
    <div class="card" style="margin-bottom:24px;overflow-x:auto">
      <table><thead><tr>
        <th>Clave</th><th>Resumen</th><th>Pais</th><th>Marca</th>
        <th>Estado</th><th>Prioridad</th><th>Asignado</th>
        <th style="text-align:right">Dias</th><th style="text-align:right">ORs</th>
      </tr></thead><tbody id="tbody-jira"></tbody></table>
    </div>`;

  // Chart 1: tickets por dia
  const diasK=Object.keys(j.por_dia||{}).map(Number).sort((a,b)=>a-b);
  const diasV=diasK.map(k=>j.por_dia[k]);
  if(diasK.length>0){
    charts.push(new Chart(document.getElementById('jc1').getContext('2d'),{
      type:'bar',
      data:{labels:diasK.map(d=>'D'+d),datasets:[{label:'Tickets',data:diasV,backgroundColor:'#2E75B6',borderRadius:3}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}},x:{ticks:{font:{size:10}}}}}
    }));
  }

  // Chart 2: por estado
  const estD=j.por_estado||[];
  if(estD.length>0){
    const estColors=estD.map(e=>e[0]==='Cerrado'||e[0]==='Resuelto'?'#375623':e[0]==='Pendiente de proveedor'?'#C55A11':e[0]==='En Nivel 1'?'#ED7D31':'#2E75B6');
    charts.push(new Chart(document.getElementById('jc2').getContext('2d'),{
      type:'bar',
      data:{labels:estD.map(e=>e[0]),datasets:[{label:'Tickets',data:estD.map(e=>e[1]),backgroundColor:estColors,borderRadius:3}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{precision:0}},y:{ticks:{font:{size:11}}}}}
    }));
  }

  // Chart 3: por pais
  const paisD=j.por_pais||[];
  if(paisD.length>0){
    charts.push(new Chart(document.getElementById('jc3').getContext('2d'),{
      type:'bar',
      data:{labels:paisD.map(e=>e[0]),datasets:[{label:'Tickets',data:paisD.map(e=>e[1]),backgroundColor:'#2E75B6',borderRadius:3}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{precision:0}},y:{ticks:{font:{size:11}}}}}
    }));
  }

  // Chart 4: por marca
  const marcaD=j.por_marca||[];
  if(marcaD.length>0){
    charts.push(new Chart(document.getElementById('jc4').getContext('2d'),{
      type:'bar',
      data:{labels:marcaD.map(e=>e[0]),datasets:[{label:'Tickets',data:marcaD.map(e=>e[1]),backgroundColor:'#ED7D31',borderRadius:3}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{precision:0}},y:{ticks:{font:{size:11}}}}}
    }));
  }

  // Tabla activos
  const tbody=document.getElementById('tbody-jira');
  activos.forEach(r=>{
    const prioColor=r.prioridad==='Critica'||r.prioridad==='Crítica'?'#C00':r.prioridad==='Alta'?'#C55A11':r.prioridad==='Media'?'#ED7D31':'#888';
    const diasSt=r.dias>7?'color:#C55A11;font-weight:bold':r.dias>3?'color:#ED7D31':r.dias>0?'color:#888':'';
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><span class="badge">${r.clave}</span></td>
      <td style="max-width:280px;font-size:11px;line-height:1.4">${r.resumen}</td>
      <td style="font-size:11px">${r.pais}</td>
      <td style="font-size:11px">${r.marca}</td>
      <td style="font-size:11px">${r.estado}</td>
      <td style="color:${prioColor};font-size:11px;font-weight:bold">${r.prioridad}</td>
      <td style="font-size:11px">${r.asignado}</td>
      <td style="text-align:right;${diasSt}">${r.dias}d</td>
      <td style="text-align:right;font-weight:bold">${r.ordenes||0}</td>`;
    tbody.appendChild(tr);
  });
}

function selDia(d){diaActual=d;renderDia();}
renderVista();
</script>
