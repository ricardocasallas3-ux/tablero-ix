<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero Medidores IX Comercio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;font-size:13px}
header{background:#1F4E79;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
header h1{font-size:16px;font-weight:bold}
.sub{font-size:11px;opacity:.75;margin-top:2px}

/* Navegación de vistas */
.visnav{background:#fff;border-bottom:2px solid #1F4E79;display:flex;align-items:center;padding:0 24px;gap:2px}
.vistab{padding:10px 20px;cursor:pointer;border:none;background:none;font-size:13px;font-weight:700;color:#666;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.15s}
.vistab.on{color:#1F4E79;border-bottom-color:#1F4E79}
.sep{height:28px;width:1px;background:#ddd;margin:0 8px;align-self:center}

/* Tabs de mes */
.mes-row{background:#f7f9fc;border-bottom:1px solid #dde3ea;display:flex;padding:6px 24px;gap:4px;align-items:center}
.mes-row label{font-size:11px;color:#888;margin-right:6px;font-weight:600}
.metab{padding:5px 14px;cursor:pointer;border:1px solid #ccc;border-radius:20px;background:#fff;font-size:12px;font-weight:600;color:#555;transition:.15s}
.metab.on{background:#1F4E79;color:#fff;border-color:#1F4E79}

.wrap{padding:18px 24px;max-width:1440px;margin:0 auto}
.sec{font-size:14px;color:#1F4E79;font-weight:bold;margin:18px 0 10px;padding-bottom:5px;border-bottom:2px solid #1F4E79;display:flex;align-items:center;gap:10px}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:#fff;border-radius:8px;padding:13px 15px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid #2E75B6}
.kpi.warn{border-left-color:#C55A11}
.kpi.ok{border-left-color:#375623}
.kpi.gris{border-left-color:#888}
.kl{font-size:10px;color:#777;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.kv{font-size:22px;font-weight:bold;color:#1F4E79;line-height:1.1}
.kv.red{color:#C55A11}
.kv.green{color:#375623}
.ks{font-size:10px;color:#aaa;margin-top:3px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:860px){.grid2{grid-template-columns:1fr}}
.card{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card h3{font-size:11px;color:#1F4E79;font-weight:bold;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.ch{position:relative;height:260px}

/* Selector de día */
.dia-bar{background:#fff;border-radius:8px;padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.dia-bar label{font-size:12px;font-weight:700;color:#1F4E79;white-space:nowrap}
.dia-btns{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.dia-btn{padding:5px 11px;border:1px solid #ccd;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;background:#f8f9fc;color:#444;transition:.12s;min-width:36px;text-align:center}
.dia-btn.on{background:#1F4E79;color:#fff;border-color:#1F4E79}
.dia-btn.empty{background:#f2f2f2;color:#bbb;border-color:#e5e5e5;cursor:default}
.dia-btn:not(.empty):hover{background:#D6E4F0;border-color:#2E75B6}

/* Tabla */
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1F4E79;color:#fff;padding:8px 10px;text-align:left;font-weight:600;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid #eee;vertical-align:middle}
tr.click{cursor:pointer}
tr.click:hover td{background:#EBF3FB}
.badge{display:inline-block;background:#D6E4F0;color:#1F4E79;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:bold;white-space:nowrap}
.bar-wrap{display:flex;align-items:center;gap:6px}
.barh{height:8px;border-radius:4px;min-width:2px}

/* Highlight día actual en tabla */
td.dia-col{text-align:center;font-weight:bold;color:#1F4E79;font-size:12px}
td.dia-col.hoy{background:#FFF2CC;color:#7F6000;border-radius:4px}

/* Modal */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:1000;align-items:center;justify-content:center}
.mbg.show{display:flex}
.modal{background:#fff;border-radius:10px;padding:24px;width:92%;max-width:820px;max-height:88vh;overflow-y:auto;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.28)}
.mclose{position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#888}
.mclose:hover{color:#1F4E79}
.mtitle{font-size:15px;font-weight:bold;color:#1F4E79;margin-bottom:3px}
.mdesc{font-size:11px;color:#888;margin-bottom:14px}
.mmeta{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.mmeta .m{background:#f0f4f8;border-radius:6px;padding:8px 14px;font-size:12px}
.mmeta .m strong{display:block;font-size:17px;color:#1F4E79;font-weight:bold}
.ch-m{position:relative;height:290px}
</style>
</head>
<body>
<header>
  <div>
    <h1>📊 Medidores de Predicción — IX Comercio</h1>
    <div class="sub">ORs Incidentadas · Diagnóstico Causas BTI</div>
  </div>
  <div class="sub" id="fh"></div>
</header>

<!-- Vista tabs -->
<div class="visnav">
  <button class="vistab on" id="vtMes"    onclick="setVista('mes')">📅 Vista Mensual</button>
  <button class="vistab"    id="vtDia"    onclick="setVista('dia')">🔍 Vista del Día</button>
</div>

<!-- Selector mes (compartido) -->
<div class="mes-row">
  <label>MES:</label>
  <div id="metabs"></div>
</div>

<div class="wrap" id="main"></div>

<!-- Modal detalle mensual de una causa -->
<div class="mbg" id="mbg" onclick="cerrarModal(event)">
  <div class="modal">
    <button class="mclose" onclick="document.getElementById('mbg').classList.remove('show')">✕</button>
    <div class="mtitle" id="m-tit"></div>
    <div class="mdesc"  id="m-desc"></div>
    <div class="mmeta"  id="m-meta"></div>
    <div class="ch-m"><canvas id="m-ch"></canvas></div>
  </div>
</div>

const MESES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo"];
let mes = MESES[MESES.length-1];
let vista = 'mes';
let diaActual = null;
let charts=[], modalChart=null;

// Fecha header
document.getElementById('fh').textContent =
  'Actualizado: '+new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'});

// Tabs de mes
const metabsDiv = document.getElementById('metabs');
MESES.forEach(m=>{
  const b=document.createElement('button');
  b.className='metab'+(m===mes?' on':'');
  b.textContent=m; b.dataset.mes=m;
  b.onclick=()=>{mes=m;diaActual=null;document.querySelectorAll('.metab').forEach(x=>x.classList.toggle('on',x.dataset.mes===m));renderVista()};
  metabsDiv.appendChild(b);
});

function setVista(v){
  vista=v;
  document.getElementById('vtMes').classList.toggle('on',v==='mes');
  document.getElementById('vtDia').classList.toggle('on',v==='dia');
  renderVista();
}

function cerrarModal(e){if(e.target===document.getElementById('mbg')) document.getElementById('mbg').classList.remove('show');}
document.addEventListener('keydown',e=>{if(e.key==='Escape') document.getElementById('mbg').classList.remove('show')});

function fmt(n){return(n||0).toLocaleString('es-CO')}
function pct(n){return n!=null?(+n*100).toFixed(1)+'%':'—'}

function killCharts(){charts.forEach(c=>c.destroy());charts=[];}

function renderVista(){
  killCharts();
  if(modalChart){modalChart.destroy();modalChart=null;}
  document.getElementById('mbg').classList.remove('show');
  if(vista==='mes') renderMes();
  else renderDia();
}

// ═══════════════════════════════════════════════
function renderMes(){
  const d=D[mes]; if(!d) return;
  const p1=d.pred1, p2=d.pred2;
  const mci   = p1.totales.mci_pct||p1.total_ant.mci_pct||0;
  const incid = p1.totales.incidentadas||p1.total_ant.incidentadas||0;
  const ingr  = p1.totales.ingresadas||p1.total_ant.ingresadas||0;
  const finl  = p1.totales.finalizadas||p1.total_ant.finalizadas||0;
  const pctAnt= p1.backlog.pct_antiguas||0;
  const top   = p2[0]||null;

  document.getElementById('main').innerHTML=`
    <div class="sec">🔵 Medidor 1 — Contabilización Mensual</div>
    <div class="kpis">
      <div class="kpi ${mci>0.15?'warn':mci<0.08?'ok':''}">
        <div class="kl">MCI — % Incidentadas</div>
        <div class="kv ${mci>0.15?'red':mci<0.08?'green':''}">${(mci*100).toFixed(1)}%</div>
        <div class="ks">Meta &lt; 10%</div>
      </div>
      <div class="kpi"><div class="kl">ORs Incidentadas</div><div class="kv">${fmt(incid)}</div><div class="ks">Acumulado mes</div></div>
      <div class="kpi"><div class="kl">ORs Ingresadas</div><div class="kv">${fmt(ingr)}</div><div class="ks">Total mes</div></div>
      <div class="kpi"><div class="kl">ORs Finalizadas</div><div class="kv">${fmt(finl)}</div><div class="ks">Total mes</div></div>
      <div class="kpi ${pctAnt>0.5?'warn':''}">
        <div class="kl">% ORs Antiguas &gt;2d</div>
        <div class="kv ${pctAnt>0.5?'red':''}">${(pctAnt*100).toFixed(1)}%</div>
        <div class="ks">Antiguas en backlog</div>
      </div>
      ${top?`<div class="kpi warn"><div class="kl">Top causa BTI</div><div class="kv" style="font-size:15px">${top.bti}</div><div class="ks">${top.pct?top.pct.toFixed(1)+'%':''} · ${fmt(top.total)} ORs</div></div>`:''}
    </div>
    <div class="grid2">
      <div class="card"><h3>📈 ORs diarias del mes</h3><div class="ch"><canvas id="c1"></canvas></div></div>
      <div class="card"><h3>🎯 Top 10 causas BTI — % del mes</h3><div class="ch"><canvas id="c2"></canvas></div></div>
    </div>
    <div class="sec">🔴 Medidor 2 — Causas Raíz BTI <span style="font-size:11px;font-weight:normal;color:#888">· Clic en fila para ver detalle diario</span></div>
    <div class="card" style="margin-bottom:24px;overflow-x:auto">
      <table><thead><tr>
        <th>#</th><th>Causa BTI</th><th>Descripción</th>
        <th style="text-align:right">ORs mes</th>
        <th style="min-width:140px">% mes</th>
        <th>Fecha Correctivo</th><th>Rec.</th><th>📊</th>
      </tr></thead><tbody id="tbody"></tbody></table>
    </div>`;

  const dias=p1.dias||[];
  const C1=document.getElementById('c1').getContext('2d');
  charts.push(new Chart(C1,{
    type:'line',
    data:{labels:dias.map(d=>'D'+d),datasets:[
      {label:'Ingresadas',data:dias.map(d=>p1.series.ingresadas[d]||null),borderColor:'#2E75B6',backgroundColor:'rgba(46,117,182,.08)',tension:.3,pointRadius:2},
      {label:'Finalizadas',data:dias.map(d=>p1.series.finalizadas[d]||null),borderColor:'#375623',backgroundColor:'rgba(55,86,35,.08)',tension:.3,pointRadius:2},
      {label:'Incidentadas',data:dias.map(d=>p1.series.incidentadas[d]||null),borderColor:'#C55A11',backgroundColor:'rgba(197,90,17,.08)',tension:.3,pointRadius:2},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{size:11}}}},
      scales:{y:{beginAtZero:true},x:{ticks:{font:{size:10}}}}
    }
  }));

  const top10=p2.slice(0,10);
  const C2=document.getElementById('c2').getContext('2d');
  charts.push(new Chart(C2,{
    type:'bar',
    data:{labels:top10.map(c=>c.bti),datasets:[{
      label:'% mes',data:top10.map(c=>c.pct||0),
      backgroundColor:top10.map((_,i)=>i===0?'#C55A11':i<3?'#ED7D31':'#2E75B6'),
    }]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.x.toFixed(1)}% (${top10[ctx.dataIndex].total} ORs)`}}},
      scales:{x:{beginAtZero:true,ticks:{callback:v=>v+'%'}},y:{ticks:{font:{size:11}}}}
    }
  }));

  const tbody=document.getElementById('tbody');
  const maxP=p2.length>0?(p2[0].pct||1):1;
  p2.forEach((c,i)=>{
    const w=Math.round((c.pct||0)/maxP*110);
    const hasDiario=Object.keys(c.diario||{}).length>0;
    const tr=document.createElement('tr');
    if(hasDiario) tr.className='click';
    tr.innerHTML=`
      <td style="color:#bbb;font-size:11px">${i+1}</td>
      <td><span class="badge">${c.bti}</span></td>
      <td style="max-width:280px;font-size:11px;line-height:1.4">${c.desc}</td>
      <td style="text-align:right;font-weight:bold">${fmt(c.total)}</td>
      <td><div class="bar-wrap">
        <div class="barh" style="width:${w}px;background:${i<1?'#C55A11':i<3?'#ED7D31':'#BDD7EE'}"></div>
        <span style="font-size:11px">${c.pct!=null?c.pct.toFixed(1)+'%':''}</span>
      </div></td>
      <td style="font-size:11px;color:#777;white-space:nowrap">${c.fecha_fix||'—'}</td>
      <td style="text-align:center;font-size:11px">${c.recurrencia!=null?c.recurrencia:'—'}</td>
      <td style="text-align:center">${hasDiario?'📊':''}</td>`;
    if(hasDiario) tr.onclick=()=>abrirDetalleMes(c,dias);
    tbody.appendChild(tr);
  });
}

function abrirDetalleMes(c,dias){
  if(modalChart){modalChart.destroy();modalChart=null;}
  document.getElementById('m-tit').textContent  = c.bti+' — Detalle diario ('+mes+')';
  document.getElementById('m-desc').textContent = c.desc;
  document.getElementById('m-meta').innerHTML=`
    <div class="m"><strong>${fmt(c.total)}</strong>ORs totales</div>
    <div class="m"><strong>${c.pct!=null?c.pct.toFixed(2)+'%':'—'}</strong>% del mes</div>
    ${c.fecha_fix?`<div class="m"><strong>${c.fecha_fix}</strong>Fecha correctivo</div>`:''}
    ${c.recurrencia!=null?`<div class="m"><strong>${c.recurrencia}</strong>Recurrencias</div>`:''}`;
  const todos = dias.length>0?dias:Object.keys(c.diario).map(Number).sort((a,b)=>a-b);
  const vals  = todos.map(d=>c.diario[d]||0);
  const ctx   = document.getElementById('m-ch').getContext('2d');
  modalChart  = new Chart(ctx,{
    type:'bar',
    data:{labels:todos.map(d=>'Día '+d),datasets:[{
      label:'ORs',data:vals,
      backgroundColor:vals.map(v=>v>0?'#2E75B6':'#EEEEEE'),borderRadius:3,
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{title:c=>c[0].label,label:c=>` ${c.parsed.y} ORs`}}},
      scales:{y:{beginAtZero:true,ticks:{precision:0}},x:{ticks:{font:{size:10},maxRotation:0}}}
    }
  });
  document.getElementById('mbg').classList.add('show');
}

function renderDia(){
  const d=D[mes]; if(!d) return;
  const p1=d.pred1, p2=d.pred2;
  const dias=p1.dias||[];

  // Inicializar día si no hay uno seleccionado → último día con datos
  if(!diaActual||!dias.includes(diaActual)){
    const conDatos=dias.filter(dd=>p1.series.ingresadas[dd]||p2.some(c=>c.diario[dd]));
    diaActual=conDatos.length>0?conDatos[conDatos.length-1]:dias[dias.length-1];
  }

  // Causas de ese día, ordenadas por ORs desc
  const causasHoy = p2.map(c=>{
    const v=c.diario[diaActual]||0;
    return {...c, hoy:v};
  }).filter(c=>c.hoy>0).sort((a,b)=>b.hoy-a.hoy);

  const totalHoy    = causasHoy.reduce((s,c)=>s+c.hoy,0);
  const ingrH       = p1.series.ingresadas[diaActual]||0;
  const finalH      = p1.series.finalizadas[diaActual]||0;
  const incidH      = p1.series.incidentadas[diaActual]||0;
  const arrastreH   = p1.series.arrastre[diaActual]||0;
  const totalIxH    = p1.series.total_ix[diaActual]||0;
  const mciH        = p1.series.mci_pct[diaActual]||0;

  // Botones de días
  const diasBtns = dias.map(dd=>{
    const hayDatos=p1.series.ingresadas[dd]||p2.some(c=>c.diario[dd]);
    return `<button class="dia-btn${dd===diaActual?' on':''}${!hayDatos?' empty':''}"
      onclick="${hayDatos?`selDia(${dd})`:'void(0)'}">${dd}</button>`;
  }).join('');

  document.getElementById('main').innerHTML=`
    <div class="dia-bar">
      <label>📅 Día:</label>
      <div class="dia-btns">${diasBtns}</div>
    </div>

    <div class="sec">🔵 Medidor 1 — Día ${diaActual} de ${mes}</div>
    <div class="kpis">
      <div class="kpi ${mciH>0.15?'warn':mciH<0.08&&mciH>0?'ok':''}">
        <div class="kl">MCI del día</div>
        <div class="kv ${mciH>0.15?'red':mciH<0.08&&mciH>0?'green':''}">${(mciH*100).toFixed(1)}%</div>
        <div class="ks">Meta &lt; 10%</div>
      </div>
      <div class="kpi"><div class="kl">ORs Arrastre</div><div class="kv">${fmt(arrastreH)}</div><div class="ks">Del día anterior</div></div>
      <div class="kpi"><div class="kl">ORs Ingresadas</div><div class="kv">${fmt(ingrH)}</div><div class="ks">Nuevas del día</div></div>
      <div class="kpi"><div class="kl">ORs Finalizadas</div><div class="kv">${fmt(finalH)}</div><div class="ks">Cerradas hoy</div></div>
      <div class="kpi ${incidH>50?'warn':''}"><div class="kl">ORs Incidentadas</div><div class="kv">${fmt(incidH)}</div><div class="ks">Reportadas hoy</div></div>
      <div class="kpi gris"><div class="kl">Total ORs en IX</div><div class="kv">${fmt(totalIxH)}</div><div class="ks">Todas las ORs activas</div></div>
    </div>

    <div class="sec">🔴 Medidor 2 — Causas BTI del día ${diaActual} <span style="font-size:11px;font-weight:normal;color:#888">· ${causasHoy.length} causas · ${fmt(totalHoy)} ORs</span></div>

    ${causasHoy.length===0?'<div class="card" style="color:#888;padding:20px">Sin registros para este día.</div>':''}

    ${causasHoy.length>0?`
    <div class="grid2">
      <div class="card"><h3>📊 Distribución de causas — Día ${diaActual}</h3><div class="ch"><canvas id="cd1"></canvas></div></div>
      <div class="card"><h3>📋 Resumen del día vs mes</h3><div class="ch"><canvas id="cd2"></canvas></div></div>
    </div>
    <div class="card" style="margin-bottom:24px;overflow-x:auto">
      <table>
        <thead><tr>
          <th>#</th><th>Causa BTI</th><th>Descripción</th>
          <th style="text-align:right">ORs hoy</th>
          <th style="min-width:120px">% del día</th>
          <th style="text-align:right">ORs mes</th>
          <th>% mes</th>
          <th>Fecha Correctivo</th>
        </tr></thead>
        <tbody id="tbody-dia"></tbody>
      </table>
    </div>`:''}
  `;

  if(causasHoy.length===0) return;

  // Chart izq: barras causas del día
  const top12=causasHoy.slice(0,12);
  const CD1=document.getElementById('cd1').getContext('2d');
  charts.push(new Chart(CD1,{
    type:'bar',
    data:{
      labels:top12.map(c=>c.bti),
      datasets:[{
        label:'ORs hoy',
        data:top12.map(c=>c.hoy),
        backgroundColor:top12.map((_,i)=>i===0?'#C55A11':i<3?'#ED7D31':'#2E75B6'),
        borderRadius:4,
      }]
    },
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.x} ORs (${((ctx.parsed.x/totalHoy)*100).toFixed(1)}% del día)`}}},
      scales:{x:{beginAtZero:true,ticks:{precision:0}},y:{ticks:{font:{size:11}}}}
    }
  }));

  // Chart der: comparativa hoy vs mes para top 8
  const top8=causasHoy.slice(0,8);
  const CD2=document.getElementById('cd2').getContext('2d');
  charts.push(new Chart(CD2,{
    type:'bar',
    data:{
      labels:top8.map(c=>c.bti),
      datasets:[
        {label:'ORs hoy',data:top8.map(c=>c.hoy),backgroundColor:'#2E75B6',borderRadius:3},
        {label:'ORs mes (total)',data:top8.map(c=>c.total),backgroundColor:'#BDD7EE',borderRadius:3},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{size:11}}}},
      scales:{x:{ticks:{font:{size:10}}},y:{beginAtZero:true,ticks:{precision:0}}}
    }
  }));

  // Tabla del día
  const tbody=document.getElementById('tbody-dia');
  causasHoy.forEach((c,i)=>{
    const pctDia=totalHoy>0?((c.hoy/totalHoy)*100).toFixed(1):0;
    const w=Math.round(c.hoy/causasHoy[0].hoy*110);
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td style="color:#bbb;font-size:11px">${i+1}</td>
      <td><span class="badge">${c.bti}</span></td>
      <td style="max-width:280px;font-size:11px;line-height:1.4">${c.desc}</td>
      <td style="text-align:right;font-weight:bold;color:#1F4E79;font-size:14px">${c.hoy}</td>
      <td><div class="bar-wrap">
        <div class="barh" style="width:${w}px;background:${i<1?'#C55A11':i<3?'#ED7D31':'#2E75B6'}"></div>
        <span style="font-size:11px">${pctDia}%</span>
      </div></td>
      <td style="text-align:right;color:#888">${fmt(c.total)}</td>
      <td style="font-size:11px;color:#888">${c.pct!=null?c.pct.toFixed(1)+'%':''}</td>
      <td style="font-size:11px;color:#777;white-space:nowrap">${c.fecha_fix||'—'}</td>`;
    tbody.appendChild(tr);
  });
}

function selDia(d){
  diaActual=d;
  renderDia();
}

renderVista();
</script>
</body>
</html>
